services:
  - type: web
    name: meta-ads-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python meta_ads_agent.py
    envVars:
      - key: PRODUCTION
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
    envFile: .env.txt
    autoDeploy: true
    healthCheckPath: /api/whoami
    disk:
      - name: data
        mountPath: /data
        sizeGB: 1
